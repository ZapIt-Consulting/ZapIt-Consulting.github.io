"$schema" = "./node_modules/wrangler/config-schema.json"
name = "zapit-website"
compatibility_date = "2024-11-01"
pages_build_output_dir = "./dist"

[build]
command = "npm run build"

[assets]
directory = "./dist"

[[routes]]
pattern = "zapitlabs.com"
custom_domain = true

[[routes]]
pattern = "www.zapitlabs.com"
custom_domain = true
